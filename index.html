<!DOCTYPE html>
<html>
<head>
    <title>Mortgage Offset Simulation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #121212;
            color: #e0e0e0;
            text-align: left;
        }
        .container {
            max-width: 100%;
            margin: 2%;
            text-align: left;
        }
        .row {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .column1 {
            margin-right: 20px;
            padding: 10px;
        }
        .column2 {
            flex: 55%;
            padding: 10px;
        }
        table {
            border-collapse: collapse;
            margin-bottom: 30px;
            width: 100%;
        }
        th, td {
            border: 1px solid #444;
            padding: 8px;
        }
        th {
            background-color: #333;
        }
        input {
            padding: 5px;
            margin: 5px 0;
            background-color: #333;
            color: #e0e0e0;
            border: 1px solid #555;
        }
        button {
            padding: 8px 12px;
            background-color: #555;
            color: #e0e0e0;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #666;
        }
        label {
            display: block;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Mortgage Offset Simulation</h1>
    <div class="row">
        <div class="column1">
            <form id="simulation-form">
                <label>Principal (RM):</label>
                <input type="number" name="principal" step="any" value="590000">
                <label>Annual Interest Rate (%):</label>
                <input type="number" name="annual_interest_rate" step="any" value="3.95">
                <label>Original Term (years):</label>
                <input type="number" name="original_term_years" value="35">
                <label>Simulation Term (years):</label>
                <input type="number" name="simulation_term_years" value="15">
                <label>Offset Threshold (RM):</label>
                <input type="number" name="offset_threshold" step="any" value="25000">
                <br>
                <button type="submit">Simulate</button>
            </form>
        </div>
        <div class="column2">
            <h2>35-Year Accelerated Term Analysis Summary (Baseline)</h2>
            <div id="baseline_summary"></div>
        </div>
    </div>
   
    <h2>Detailed Amortization for Simulation Term (Default: <span id="simulation_term_display">15</span> years)</h2>
    <p>Derived Accelerated (Fixed) Payment: <span id="accelerated_payment"></span></p>
    <div id="detailed_amortization_table"></div>
   
    <h2>Combined Offset Simulation Table</h2>
    <div id="combined_offset_table"></div>
</div>

<script>
    function formatNumber(num) {
        let parts = num.split('.');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        return parts.join('.');
    }

    function calc_baseline_payment(principal, monthly_rate, n_months) {
        return principal * monthly_rate * Math.pow(1 + monthly_rate, n_months) / (Math.pow(1 + monthly_rate, n_months) - 1);
    }

    function accelerated_term_analysis(principal, monthly_rate, original_term_years) {
        let n_original = original_term_years * 12;
        let baseline_payment = calc_baseline_payment(principal, monthly_rate, n_original);
        let years = Array.from({length: original_term_years}, (_, i) => i + 1);
        let summary_table = [];
        for (let term of years) {
            let n_target = term * 12;
            let target_payment = calc_baseline_payment(principal, monthly_rate, n_target);
            let extra_payment = target_payment - baseline_payment;
            let total_payment = target_payment * n_target;
            let total_interest = total_payment - principal;
            let remaining_baseline = principal * (Math.pow(1 + monthly_rate, n_original) - Math.pow(1 + monthly_rate, n_target)) / (Math.pow(1 + monthly_rate, n_original) - 1);
            let advanced_principal = principal - remaining_baseline;
            summary_table.push([
                term,
                `RM${formatNumber(target_payment.toFixed(2))}`,
                `RM${formatNumber(extra_payment.toFixed(2))}`,
                `RM${formatNumber(total_interest.toFixed(2))}`,
                `RM${formatNumber(advanced_principal.toFixed(2))}`
            ]);
        }
        return [baseline_payment, summary_table];
    }

    function generate_amortization_schedule(principal, monthly_rate, n_months, monthly_payment) {
        let balance = principal;
        let schedule = [];
        let cumulative_principal = 0;
        for (let month = 1; month <= n_months; month++) {
            let interest_payment = balance * monthly_rate;
            let principal_payment = monthly_payment - interest_payment;
            cumulative_principal += principal_payment;
            balance -= principal_payment;
            if (balance < 0) {
                principal_payment += balance;
                balance = 0;
            }
            schedule.push({
                Month: month,
                Payment: monthly_payment,
                Interest: interest_payment,
                Principal: principal_payment,
                'Cumulative Principal': cumulative_principal,
                'Remaining Balance': balance
            });
            if (balance <= 0) break;
        }
        return schedule;
    }

    function detailed_amortization(principal, monthly_rate, selected_term_years, baseline_payment) {
        let n_selected = selected_term_years * 12;
        let accelerated_payment = calc_baseline_payment(principal, monthly_rate, n_selected);
        let accelerated_schedule = generate_amortization_schedule(principal, monthly_rate, n_selected, accelerated_payment);
        let baseline_schedule = generate_amortization_schedule(principal, monthly_rate, n_selected, baseline_payment);
        let table = [];
        let cumulative_extra = 0;
        for (let i = 0; i < accelerated_schedule.length; i++) {
            let acc = accelerated_schedule[i];
            let base = baseline_schedule[i];
            let extra_principal = acc.Principal - base.Principal;
            cumulative_extra += extra_principal;
            table.push([
                acc.Month,
                `RM${formatNumber(acc.Payment.toFixed(2))}`,
                `RM${formatNumber(acc.Interest.toFixed(2))}`,
                `RM${formatNumber(acc.Principal.toFixed(2))}`,
                `RM${formatNumber(acc['Cumulative Principal'].toFixed(2))}`,
                `RM${formatNumber(acc['Remaining Balance'].toFixed(2))}`,
                `RM${formatNumber(extra_principal.toFixed(2))}`,
                `RM${formatNumber(cumulative_extra.toFixed(2))}`
            ]);
        }
        return [accelerated_payment, table];
    }

    function simulate_combined_offset_advance(principal, monthly_rate, fixed_payment, baseline_payment, offset_threshold, target_term_years) {
        let total_months = target_term_years * 12;
        let base_principal_paid = 0.0;
        let offset_total = 0.0;
        let extra_accumulated = 0.0;
        let schedule = [];
        for (let m = 1; m <= total_months; m++) {
            let effective_outstanding = principal - (base_principal_paid + extra_accumulated + offset_total);
            let interest_payment = effective_outstanding * monthly_rate;
            let accelerated_principal = fixed_payment - interest_payment;
            let baseline_balance = principal - base_principal_paid;
            let baseline_interest = baseline_balance * monthly_rate;
            let baseline_principal = baseline_payment - baseline_interest;
            let extra = accelerated_principal - baseline_principal;
            if (extra < 0) extra = 0;
            extra_accumulated += extra;
            base_principal_paid += baseline_principal;
            let offset_applied = 0;
            if (extra_accumulated >= offset_threshold) {
                offset_applied = offset_threshold;
                offset_total += offset_threshold;
                extra_accumulated = 0;
            }
            let total_effective_reduction = base_principal_paid + extra_accumulated + offset_total;
            let remaining_principal = principal - total_effective_reduction;
            schedule.push({
                Month: m,
                'Fixed Payment': fixed_payment,
                'Effective Outstanding': effective_outstanding,
                Interest: interest_payment,
                'Accelerated Principal': accelerated_principal,
                'Baseline Principal': baseline_principal,
                'Extra Added': extra,
                'Extra Accumulated': extra_accumulated,
                'Offset Applied': offset_applied,
                'Baseline Paid': base_principal_paid,
                'Total Offset': offset_total,
                'Total Effective Reduction': total_effective_reduction,
                'Remaining Principal': remaining_principal
            });
            if (remaining_principal <= 0) break;
        }
        return schedule;
    }

    function generateTable(headers, rows) {
        let html = '<table><thead><tr>';
        for (let header of headers) {
            html += `<th>${header}</th>`;
        }
        html += '</tr></thead><tbody>';
        for (let row of rows) {
            html += '<tr>';
            for (let cell of row) {
                html += `<td>${cell}</td>`;
            }
            html += '</tr>';
        }
        html += '</tbody></table>';
        return html;
    }

    function updateResults() {
        let principal = parseFloat(document.querySelector('[name="principal"]').value) || 590000;
        let annual_interest_rate = parseFloat(document.querySelector('[name="annual_interest_rate"]').value) || 3.95;
        let original_term_years = parseInt(document.querySelector('[name="original_term_years"]').value) || 35;
        let simulation_term_years = parseInt(document.querySelector('[name="simulation_term_years"]').value) || 15;
        let offset_threshold = parseFloat(document.querySelector('[name="offset_threshold"]').value) || 25000;

        let monthly_rate = (annual_interest_rate / 100) / 12;

        let [baseline_payment, baseline_summary_table] = accelerated_term_analysis(principal, monthly_rate, original_term_years);
        let baseline_summary_html = generateTable(["Term (years)", "Required Monthly Payment", "Extra Payment", "Total Interest", "Advanced Principal"], baseline_summary_table);
        document.getElementById('baseline_summary').innerHTML = baseline_summary_html;

        let [accelerated_payment, detailed_table] = detailed_amortization(principal, monthly_rate, simulation_term_years, baseline_payment);
        document.getElementById('accelerated_payment').textContent = `RM${formatNumber(accelerated_payment.toFixed(2))}`;
        let detailed_amortization_html = generateTable(["Month", "Payment", "Interest", "Principal", "Cum. Principal", "Remaining Balance", "Extra Principal", "Cum. Extra Principal"], detailed_table);
        document.getElementById('detailed_amortization_table').innerHTML = detailed_amortization_html;

        let combined_schedule = simulate_combined_offset_advance(principal, monthly_rate, accelerated_payment, baseline_payment, offset_threshold, simulation_term_years);
        let combined_rows = combined_schedule.map(entry => [
            entry.Month,
            `RM${formatNumber(entry['Fixed Payment'].toFixed(2))}`,
            `RM${formatNumber(entry['Effective Outstanding'].toFixed(2))}`,
            `RM${formatNumber(entry.Interest.toFixed(2))}`,
            `RM${formatNumber(entry['Accelerated Principal'].toFixed(2))}`,
            `RM${formatNumber(entry['Baseline Principal'].toFixed(2))}`,
            `RM${formatNumber(entry['Extra Added'].toFixed(2))}`,
            `RM${formatNumber(entry['Extra Accumulated'].toFixed(2))}`,
            `RM${formatNumber(entry['Offset Applied'].toFixed(2))}`,
            `RM${formatNumber(entry['Baseline Paid'].toFixed(2))}`,
            `RM${formatNumber(entry['Total Offset'].toFixed(2))}`,
            `RM${formatNumber(entry['Total Effective Reduction'].toFixed(2))}`,
            `RM${formatNumber(entry['Remaining Principal'].toFixed(2))}`
        ]);
        let combined_offset_html = generateTable(["Month", "Fixed Payment", "Effective Outstanding", "Interest", "Accelerated Principal",
                 "Baseline Principal", "Extra Added", "Extra Accumulated", "Offset Applied",
                 "Baseline Paid", "Total Offset", "Total Effective Reduction", "Remaining Principal"], combined_rows);
        document.getElementById('combined_offset_table').innerHTML = combined_offset_html;

        document.getElementById('simulation_term_display').textContent = simulation_term_years;
    }

    document.getElementById('simulation-form').addEventListener('submit', function(e) {
        e.preventDefault();
        updateResults();
    });

    window.addEventListener('load', updateResults);
</script>
</body>
</html>
